    function AppProvider({ children }) {
      const [currentUser, setCurrentUser] = useState(null);

      const [currentPage, setCurrentPage] = useState('login');
      const [params, setParams] = useState({});

      const [calls, setCalls] = useState(MOCK_CALLS);

      const [customers, setCustomers] = useState(MOCK_CUSTOMERS);
      const [kbArticles] = useState(MOCK_KB);
      const [auditLogs, setAuditLogs] = useState(MOCK_AUDIT_LOGS);
      const [notifications, setNotifications] = useState([
        { id: 1, message: 'Mumbai West: Jio Fiber Cut detected', read: false }
      ]);
      const [aiSettings, setAiSettings] = useState({
        autoTranscription: true,
        sentimentSensitivity: 75,
        autoTicketGeneration: false,
        confidenceThreshold: 80,
        modelSelected: 'Gemini 1.5 Pro'
      });

      const login = (email, password, isAdmin, selectedCompany) => {
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            const foundUser = MOCK_USERS.find(
              (u) => u.email.toLowerCase() === email.toLowerCase() &&
                     (isAdmin ? u.role === 'Admin' : u.role !== 'Admin')
            );
            if (!foundUser) {
              reject(new Error('User not found. Use admin@teleresolve.ai or agent.rahul@jio.com'));
              return;
            }
            if (password !== 'password' && password !== foundUser.role.toLowerCase()) {
              reject(new Error('Incorrect password. Use password or role name in lowercase (e.g. "admin", "agent").'));
              return;
            }
            setCurrentUser(foundUser);
            const tenant = isAdmin ? 'global' : selectedCompany;
            setCurrentTenant(tenant);
            addAuditLog(`Logged in as ${foundUser.role}`, tenant, foundUser.name);
            setCurrentPage('dashboard');
            resolve(foundUser);
          }, 800);
        });
      };

      const logout = () => {
        addAuditLog('Logged out', currentTenant, currentUser?.name);
        setCurrentUser(null);
        setCurrentTenant('global');
        setCurrentPage('login');
      };

      const addTicket = (tkt) => {
        const newTkt = {
          id: `TR-TKT-${100 + tickets.length + 1}`,
          createdDate: new Date().toISOString().split('T')[0],
          resolutionTime: '--',
          ...tkt
        };
        setTickets(prev => [newTkt, ...prev]);
        addAuditLog(`Created ticket ${newTkt.id}`, newTkt.operator, currentUser?.name || 'System');
        return newTkt;
      };

      const updateTicketStatus = (tktId, status) => {
        setTickets(prev => prev.map(t => t.id === tktId ? { ...t, status } : t));
        addAuditLog(`Updated ticket ${tktId} status to: ${status}`, currentTenant, currentUser?.name);
      };

      const addAuditLog = (action, company, user) => {
        const log = {
          time: new Date().toISOString().replace('T', ' ').substring(0, 19),
          user: user || currentUser?.name || 'System',
          action,
          company: company || 'global',
          ip: '192.168.1.52'
        };
        setAuditLogs(prev => [log, ...prev]);
      };

      const navigateTo = (page, routeParams = {}) => {
        setCurrentPage(page);
        setParams(routeParams);
      };

      return (
        <AppContext.Provider value={{
          currentUser, currentTenant, currentPage, params, darkMode, calls, tickets, customers, kbArticles, auditLogs, notifications, aiSettings,
          login, logout, addTicket, updateTicketStatus, addAuditLog, navigateTo, setDarkMode, setAiSettings, setCurrentTenant
        }}>
          {children}
        </AppContext.Provider>
      );
    }

                    <TableBody>
                      <TableRow>
                        <TableCell sx={{ fontWeight: 600 }}>Mumbai West Splicing</TableCell>
                        <TableCell><Chip label="Critical" size="small" color="error" /></TableCell>
                        <TableCell>Active</TableCell>
                      </TableRow>
                      <TableRow>
                        <TableCell sx={{ fontWeight: 600 }}>Bangalore Hub</TableCell>
                        <TableCell><Chip label="Medium" size="small" color="warning" /></TableCell>
                        <TableCell>Scheduled</TableCell>
                      </TableRow>
                    </TableBody>
                  </Table>
                </TableContainer>
              </Card>
            </Grid>
          </Grid>
        </Box>
      );
    }

    // REPORTS PAGE
    function ReportsPage() {
      const { tickets, currentTenant } = useApp();
      const [exporting, setExporting] = useState(false);

      const downloadCSV = () => {
        setExporting(true);
        setTimeout(() => {
          const list = currentTenant === 'global' ? tickets : tickets.filter(t => t.operator === currentTenant);
          let csv = "data:text/csv;charset=utf-8,ID,Issue,Customer,Status,Priority\n";
          list.forEach(t => {
            csv += `"${t.id}","${t.issue}","${t.customer}","${t.status}","${t.priority}"\n`;
          });
          const encoded = encodeURI(csv);
          const link = document.createElement("a");
          link.setAttribute("href", encoded);
          link.setAttribute("download", `teleresolve_tickets_${currentTenant}.csv`);
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          setExporting(false);
        }, 1000);
      };

      return (
        <Box sx={{ p: 4 }}>
          <Typography variant="h5" sx={{ fontWeight: 700, mb: 3 }}>Operations Report Center</Typography>
          <Grid container spacing={3}>
            <Grid item xs={12} md={6}>
              <Card sx={{ p: 4, borderRadius: '8px', border: '1px solid #E2E8F0', boxShadow: 'none' }}>
                <Typography variant="subtitle2" sx={{ fontWeight: 700, mb: 3 }}>Export Filters</Typography>
                <Box display="flex" flexDirection="column" gap={3}>
                  <FormControl fullWidth>
                    <InputLabel>Dataset</InputLabel>
                    <Select value="tickets" label="Dataset" sx={{ borderRadius: '8px' }}>
                      <MenuItem value="tickets">Support Tickets Ledger</MenuItem>
                      <MenuItem value="calls">Voice Call Logs</MenuItem>
                    </Select>
                  </FormControl>
                  <Button variant="contained" disabled={exporting} onClick={downloadCSV} sx={{ bgcolor: '#1E3A5F', py: 1.25, fontWeight: 600 }}>
                    {exporting ? 'Compiling CSV File...' : 'Generate & Download CSV Report'}
                  </Button>
                </Box>
              </Card>
            </Grid>
          </Grid>
        </Box>
      );
    }

    // SETTINGS PAGE
    function SettingsPage() {
      const { currentUser } = useApp();
      if (!currentUser) return null;

      return (
        <Box sx={{ p: 4 }}>
          <Typography variant="h5" sx={{ fontWeight: 700, mb: 3 }}>User Profile Settings</Typography>
          <Grid container spacing={3}>
            <Grid item xs={12} md={6}>
              <Card sx={{ p: 3, border: '1px solid #E2E8F0', borderRadius: '8px', boxShadow: 'none' }}>
                <Box display="flex" alignItems="center" gap={2} sx={{ mb: 3 }}>
                  <Avatar src={currentUser.avatar} sx={{ width: 54, height: 54 }} />
                  <Box>
                    <Typography variant="subtitle1" sx={{ fontWeight: 700 }}>{currentUser.name}</Typography>
                    <Typography variant="caption" color="text.secondary">{currentUser.role} Clearances</Typography>
                  </Box>
                </Box>
                <TextField label="Full Name" value={currentUser.name} disabled fullWidth sx={{ mb: 2 }} />
                <TextField label="Email ID" value={currentUser.email} disabled fullWidth sx={{ mb: 2 }} />
                <TextField label="Carrier Scope" value={currentUser.company.toUpperCase()} disabled fullWidth />
              </Card>
            </Grid>
          </Grid>
        </Box>
      );
    }

    // ADMIN PANEL
    function AdminPanelPage() {
      const { auditLogs, aiSettings, setAiSettings } = useApp();
      const [tab, setTab] = useState(0);

      return (
        <Box sx={{ p: 4 }}>
          <Typography variant="h5" sx={{ fontWeight: 700, mb: 3 }}>Global Security & AI Controls</Typography>
          <Tabs value={tab} onChange={(e, val) => setTab(val)} sx={{ mb: 3, borderBottom: '1px solid #E2E8F0' }}>
            <Tab label="AI Threshold Settings" />
            <Tab label="Security Compliance Audits" />
          </Tabs>

          {tab === 0 && (
            <Card sx={{ p: 3, borderRadius: '8px', border: '1px solid #E2E8F0', boxShadow: 'none' }}>
              <Typography variant="subtitle2" sx={{ mb: 3, fontWeight: 700 }}>AI Orchestration Parameters</Typography>
              <Grid container spacing={4}>
                <Grid item xs={12} md={6}>
                  <Box display="flex" flexDirection="column" gap={3}>
                    <Box>
                      <Typography variant="body2" sx={{ mb: 1, fontWeight: 600 }}>Confidence Threshold: {aiSettings.confidenceThreshold}%</Typography>
                      <Slider value={aiSettings.confidenceThreshold} onChange={(e, val) => setAiSettings({ ...aiSettings, confidenceThreshold: val })} />
                    </Box>
                    <Box>
                      <Box display="flex" justifyContent="space-between" alignItems="center">
                        <Typography variant="body2" sx={{ fontWeight: 600 }}>Automatic Transcribe Trigger</Typography>
                        <Switch checked={aiSettings.autoTranscription} onChange={(e) => setAiSettings({ ...aiSettings, autoTranscription: e.target.checked })} />
                      </Box>
                    </Box>
                  </Box>
                </Grid>
              </Grid>
            </Card>
          )}

          {tab === 1 && (
            <Card sx={{ p: 3, borderRadius: '8px', border: '1px solid #E2E8F0', boxShadow: 'none' }}>
              <Typography variant="subtitle2" sx={{ mb: 2, fontWeight: 700 }}>Active Audit Streams</Typography>
              <TableContainer>
                <Table size="small">
                  <TableHead sx={{ bgcolor: '#F8FAFC' }}>
                    <TableRow>
                      <TableCell>Timestamp</TableCell>
                      <TableCell>User</TableCell>
                      <TableCell>Action</TableCell>
                      <TableCell>Company</TableCell>
                    </TableRow>
                  </TableHead>
                  <TableBody>
                    {auditLogs.map((l, i) => (
                      <TableRow key={i}>
                        <TableCell sx={{ fontFamily: 'monospace' }}>{l.time}</TableCell>
                        <TableCell sx={{ fontWeight: 600 }}>{l.user}</TableCell>
                        <TableCell>{l.action}</TableCell>
                        <TableCell sx={{ textTransform: 'uppercase' }}>{l.company}</TableCell>
                      </TableRow>
                    ))}
                  </TableBody>
                </Table>
              </TableContainer>
            </Card>
          )}
        </Box>
      );
    }

    // =========================================================================
    // MAIN APP WRAPPER & ROUTER
    // =========================================================================
    function AppContent() {
      const { currentPage, currentUser, darkMode } = useApp();

      if (currentPage === 'login' || !currentUser) {
        return <LoginPage />;
      }

      const renderPage = () => {
        switch (currentPage) {
          case 'dashboard': return <DashboardPage />;
          case 'live-calls': return <LiveCallsPage />;
          case 'call-details': return <CallDetailsPage />;
          case 'ai-analyzer': return <AIAnalyzerPage />;
          case 'tickets': return <TicketsPage />;
          case 'customers': return <CustomersPage />;
          case 'customer-profile': return <CustomerProfilePage />;
          case 'knowledge-base': return <KnowledgeBasePage />;
          case 'analytics': return <AnalyticsPage />;
          case 'reports': return <ReportsPage />;
          case 'settings': return <SettingsPage />;
          case 'admin': return <AdminPanelPage />;
          default: return <DashboardPage />;
        }
      };

      return (
        <Box sx={{
          display: 'flex',
          minHeight: '100vh',
          bgcolor: darkMode ? '#111827' : '#F8FAFC',
          color: darkMode ? '#F9FAFB' : '#1F2937',
          transition: 'background-color 0.2s, color 0.2s',
          '& .MuiPaper-root': darkMode ? { bgcolor: '#1F2937', borderColor: '#374151', color: '#F9FAFB' } : {},
          '& .MuiTableCell-root': darkMode ? { color: '#E5E7EB', borderColor: '#374151' } : {},
          '& .MuiTableCell-head': darkMode ? { bgcolor: '#111827', color: '#F3F4F6' } : {},
          '& .MuiInputBase-root': darkMode ? { color: '#F9FAFB', bgcolor: '#374151', '& .MuiOutlinedInput-notchedOutline': { borderColor: '#4B5563' } } : {}
        }}>
          <Sidebar />
          <Box display="flex" flexDirection="column" flexGrow={1} overflow="hidden">
            <Navbar />
            <Box flexGrow={1} overflow="auto">
              {renderPage()}
            </Box>
          </Box>
        </Box>
      );
    }

    function App() {
      return (
        <AppProvider>
          <AppContent />
        </AppProvider>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
